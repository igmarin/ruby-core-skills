name: Tile.json Validation
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Validate tile.json
        run: |
          ruby -rjson -e '
            tile = JSON.parse(File.read("tile.json"))
            
            # Check all skills have directories
            tile.fetch("skills", {}).each do |name, entry|
              path = entry["path"]
              abort "Missing: #{path}" unless File.exist?(path)
            end
            
            # Check skill count matches
            actual = Dir.glob("skills/*/{SKILL.md,*/SKILL.md}").count
            declared = tile.fetch("skills", {}).size
            warn "Warning: #{actual} skill dirs vs #{declared} in tile.json" if actual != declared
            
            puts "tile.json: #{declared} skills, all directories present"
          '
